services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://yarn:yarn@db:5432/yarn_plugin
    depends_on:
      db:
        condition: service_healthy
    command: uvicorn yarn_plugin.main:app --host 0.0.0.0 --port 8000 --reload

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: yarn
      POSTGRES_PASSWORD: yarn
      POSTGRES_DB: yarn_plugin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yarn -d yarn_plugin"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: